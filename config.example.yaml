# Airflow MCP Server Configuration
# Copy to config.yaml and edit for your setup.

# Default DDU used when no ddu parameter is passed to a tool.
default_ddu: local

# Map of DDU codes to Airflow instances.
# Each entry needs a base_url and an auth section.
instances:
  local:
    base_url: "http://localhost:8080"
    auth:
      type: basic
      username: airflow
      password: airflow

