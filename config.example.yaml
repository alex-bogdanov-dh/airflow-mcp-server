# Airflow MCP Server Configuration
# Copy to config.yaml (or ~/.config/airflow-mcp/config.yaml) and edit.
# Alternatively, run `bash install.sh` for interactive setup.

# Default DDU used when no ddu parameter is passed to a tool.
default_ddu: local

instances:
  # --- Local development (docker-compose up) ---
  local:
    base_url: "http://localhost:8080"
    auth:
      type: basic
      username: airflow
      password: airflow

  # --- Delivery Hero instances ---
  # DH Airflow follows the pattern: airflow-{ddu}.datahub.deliveryhero.net
  # Auth: paste your session cookie from the browser after logging in via SSO.
  # Cookies expire after hours/days — refresh by logging in again.
  #
  # Uncomment and configure the DDUs you work with:

  # eiga:
  #   base_url: "https://airflow-eiga.datahub.deliveryhero.net"
  #   auth:
  #     type: dh_cookie
  #     session_cookie: ""  # paste full cookie string from browser DevTools

  # paa:
  #   base_url: "https://airflow-paa.datahub.deliveryhero.net"
  #   auth:
  #     type: dh_cookie
  #     session_cookie: ""

  # tlb:
